<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Pedido Concluído</title>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="relative h-48 overflow-hidden z-1">

        <svg viewBox="0 50 500 200" preserveAspectRatio="none" class="absolute inset-0 w-full h-full">

            <path fill="#16A34A" d="M0,0 L500,0 L500,130 C350,220 150,40 0,130 Z"></path>

        </svg>

    </header>

    <main class="relative flex-1 px-6 -mt-20 z-999">

        <div class="bg-white rounded-3xl shadow-xl p-8 text-center">
            <!-- Ícone -->
            <div
                class="w-24 h-24 mx-auto rounded-full bg-green-100 flex items-center justify-center text-5xl">

                <span class="material-symbols-outlined text-5xl text-green-500">
                    check
                </span>

            </div>

            <h1 id="statusTitle" class="text-3xl font-bold mt-5"></h1>

            <p id="statusSubTitle" class="text-slate-500 mt-2"></p>

            <p id="numeroPedido" class="font-bold text-xl">#0000</p>

        </div>

        <!-- Botões -->
        <div id="btns" class="mt-6 space-y-3">

            <button id="btnCompartilhar" class="w-full py-4 rounded-full bg-blue-600 text-white font-medium shadow">
                Compartilhar
            </button>

            <button id="btnImprimir" class="w-full py-4 rounded-full bg-slate-700 text-white font-medium shadow">
                Imprimir Via Cliente
            </button>

            <button id="btnNovoPedido" class="w-full py-4 rounded-full bg-green-600 text-white font-medium shadow">
                Novo Pedido
            </button>

        </div>

    </main>

    <script type="module" src="./js/pages/concluido.page.js"></script>

</body>

</html>
