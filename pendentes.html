<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Pendentes</title>
</head>

<body class="bg-slate-50">

    <!-- Header -->
    <header class="relative h-40 overflow-hidden">

        <svg viewBox="0 0 500 200" preserveAspectRatio="none" class="absolute inset-0 w-full h-full">

            <path fill="#2563EB" d="M0,0 L500,0 L500,130 C350,220 150,40 0,130 Z"></path>

        </svg>

        <div class="relative z-10 px-6 pt-6 flex gap-4 items-center">
            <span id="back" class="material-symbols-outlined text-3xl text-white">keyboard_return</span>

            <h1 class="text-2xl font-semibold text-white">Pendentes</h1>
            <div id="indResp" class="w-[15px] h-[15px] bg-blue-300 rounded-full ml-auto"></div>
        </div>

    </header>

    <main class="px-5 -mt-4 pb-10">

        <!-- BUSCA -->

        <div class="bg-white rounded-3xl shadow p-5 ">

            <input id="buscarVenda" type="text" placeholder="Buscar pendencia ou cliente..."
                class="w-full border-b-2 border-slate-200 py-3 outline-none focus:border-blue-500">

        </div>

        <!-- LISTA -->

        <div id="listaPendencias" class="space-y-3 mt-5">

            <!-- CARDS INSERIDOS VIA JS -->

            <div id="listaVendas" class="space-y-6">

            </div>

        </div>

    </main>

    <!-- MODAL RECEBER -->

    <div id="modalReceber" class="fixed inset-0 bg-black/40 hidden flex items-end z-50">

        <div class="bg-white w-full rounded-t-[35px] p-6 animate-slide-up">

            <div class="w-20 h-1 bg-slate-300 mx-auto mb-5 rounded-full"></div>
            
            <h2 class="text-2xl font-bold mb-5">
                Receber Pagamento
            </h2>

            <div class="space-y-4">
                <div>
                    <label class="text-slate-500">

                        Cliente

                    </label>

                    <input id="clienteReceber" disabled class="w-full border-b py-2 bg-transparent">

                </div>

                <div>

                    <label class="text-slate-500">

                        Saldo Atual

                    </label>

                    <input id="saldoReceber" disabled class="w-full border-b py-2 bg-transparent">

                </div>

                <div>

                    <label>

                        Valor Recebido

                    </label>

                    <input id="valorRecebido" type="number" step="0.01" class="w-full border-b py-3 outline-none ">

                </div>

                <div>

                    <label>

                        Forma Pagamento

                    </label>

                    <select id="formaRecebimento" class="w-full border-b py-3 outline-none">

                        <option value="pix">
                            PIX
                        </option>

                        <option value="dinheiro">
                            Dinheiro
                        </option>

                        <option value="credito">
                            Crédito
                        </option>

                        <option value="debito">
                            Débito
                        </option>

                    </select>

                </div>

                <div id="novoSaldo" class="text-red-500 font-bold">

                </div>

                <div class="flex gap-3 mt-8 ">

                    <button id="cancelarRecebimento" class="flex-1 bg-slate-200 rounded-2xl p-4">

                        Cancelar

                    </button>

                    <button id="confirmarRecebimento" class="flex-1 bg-blue-600 text-white rounded-2xl p-4">

                        Receber

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script type="module" src="./js/pages/pendentes.page.js"></script>

</body>

</html>
