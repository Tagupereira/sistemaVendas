<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Vendas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
</head>

<body class="bg-slate-50 min-h-screen">

  
    <!-- HEADER -->
    <header class="relative h-40 overflow-hidden">

        <svg viewBox="0 0 500 200" preserveAspectRatio="none" class="absolute inset-0 w-full h-full">

            <path fill="#2563EB" d="M0,0 L500,0 L500,130 C350,220 150,40 0,130 Z"></path>

        </svg>

        <div class="relative z-10 px-6 pt-6 flex items-center gap-4">

            <span id="back" class="material-symbols-outlined text-white text-3xl cursor-pointer">keyboard_return</span>

            <h1 class="text-3xl font-bold text-white">Vendas</h1>

            <div id="indResp" class="w-[15px] h-[15px] bg-blue-300 rounded-full ml-auto"></div>
        </div>

    </header>

    <main class="px-5 -mt-4 pb-10">

       
        <!-- BUSCA -->

        <div class="bg-white rounded-3xl shadow p-5 ">

            <input id="buscarVenda" type="text" placeholder="Buscar pedido ou cliente..."
                class="w-full border-b-2 border-slate-200 py-3 outline-none focus:border-blue-500">

        </div>

        <!-- LISTA -->

        <div id="listaVendas" class="space-y-3 mt-5">

            <!-- CARDS INSERIDOS VIA JS -->

            <div id="listaVendas" class="space-y-6">
                
            </div>

        </div>

    </main>

    <!-- MODAL -->

    <div id="modalVenda" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center p-4 z-50">

        <div class="bg-white w-full max-w-lg rounded-3xl shadow-xl p-6 max-h-[90vh] overflow-y-auto">

            <div class="flex justify-between items-center">

                <h2 id="tituloPedido" class="text-xl font-bold">

                    Pedido

                </h2>

                <button id="fecharModal" class="text-slate-500 text-2xl">

                    ×

                </button>

            </div>

            <!-- CLIENTE -->

            <div class="mt-5">

                <span class="text-slate-500">

                    Cliente

                </span>

                <div id="clienteVenda" class="font-medium">

                </div>

            </div>

            <!-- DATA -->

            <div class="mt-4">

                <span class="text-slate-500">

                    Data

                </span>

                <div id="dataVenda" class="font-medium">

                </div>

            </div>

            <!-- ITENS -->

            <div class="mt-6">

                <h3 class="font-bold mb-3">

                    Itens

                </h3>

                <div id="itensVenda" class="space-y-2">

                </div>

            </div>

            <!-- PAGAMENTOS -->

            <div class="mt-6">

                <h3 class="font-bold mb-3">

                    Pagamentos

                </h3>

                <div id="pagamentosVenda" class="space-y-2">

                </div>

            </div>

            <!-- TOTAL -->

            <div class="mt-6 border-t pt-4 flex justify-between text-lg font-bold">

                <span>

                    Total

                </span>

                <span id="totalVenda">

                    R$ 0,00

                </span>

            </div>

        </div>

    </div>

    <script type="module" src="../js/pages/vendas.page.js"></script>
</body>

</html>
