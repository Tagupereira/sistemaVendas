<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta content="width=device-width, initial-scale=1, maximum-scale=1" name="viewport" />
<meta name="theme-color" content="#3b82f6">
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-status-bar-style" content="default"/>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.tailwindcss.com"></script>

<title>Deliup</title>
</head>

<body class="bg-white min-h-screen flex justify-center items-center">

<div class="w-full min-h-screen bg-white relative overflow-hidden">

    <!-- Topo azul -->
    <div class="absolute top-0 left-0 w-full h-56">
        <svg viewBox="0 0 500 250" class="absolute top-0 left-0 w-full h-full" preserveAspectRatio="none">
            <path d="M0,0 L500,0 L500,120 C380,200 120,20 0,130 Z" fill="#2563eb"></path>
        </svg>

        <div class="flex flex-col items-center pt-10 relative z-10">
            <div class="w-40 h-40 bg-white rounded-full shadow-lg flex items-center justify-center">
                <img id="imgLogo" class ="w-40 h-40 rounded-full flex items-center justify-center" alt="logo"> 
            </div>

            <h1 class="text-blue-600 text-2xl font-semibold mt-4">
                Bem vindo!
            </h1>

        </div>
    </div>

    <!-- Conteúdo -->
    <div class="pt-72 px-8">

        <div class="space-y-5">

            <input id="user"
                type="text"
                placeholder="Usuário"
                class="w-full border-b-2 border-slate-200 py-3 p-5 outline-none focus:border-blue-500"
            >

            <input id="password"
                type="password"
                placeholder="Senha"
                class="w-full border-b-2 border-slate-200 py-3 p-5 outline-none focus:border-blue-500"
            >

        </div>

        <div class="text-right mt-3">
            <a href="#" class="text-sm text-blue-600">
                Esqueceu a senha?
            </a>
        </div>

        <button id="btnLogin"
            class="w-full mt-8 bg-blue-600 text-white py-3 rounded-full shadow-lg">
            Entrar
        </button>

        <button id="btnConfig"
            class="w-full mt-4 border border-blue-600 text-blue-600 py-3 rounded-full">
            Configurar Conta
        </button>

        <div class="mt-10 h-20 flex items-center justify-center flex-col">
            

            <p class="text-slate-400 text-sm">
               @Desenvolvedor
            </p>

            <p class="text-slate-400 text-sm">
               V.1.0.78
            </p>
        </div>
        

    </div>

</div>

<div id="loadingOverlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center">

        <div class="bg-white p-6 rounded-2xl shadow-lg flex items-center gap-3">

            <div class="w-6 h-6 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>

            <span>Aguarde...</span>

        </div>

    </div>


<script type="module" src="js/pages/login.page.js"></script>
</body>
</html>
