<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>

    <title>Produtos</title>
</head>

<body class="bg-slate-50">

    <!-- Header -->
    <header class="relative h-40 overflow-hidden">

        <svg viewBox="0 0 500 200" preserveAspectRatio="none" class="absolute inset-0 w-full h-full">

            <path fill="#2563EB" d="M0,0 L500,0 L500,130 C350,220 150,40 0,130 Z">
            </path>

        </svg>

        <div class="relative z-10 px-6 pt-12">

            <h1 class="text-3xl font-bold text-white">
                Produtos
            </h1>

            <!-- <p class="text-blue-100">
                Gerencie seus produtos
            </p> -->

        </div>

    </header>

    <main class="px-5 -mt-4">

        <!-- Busca -->
        <div class="bg-white rounded-2xl shadow p-4">

            <input id="pesquisa" type="text" placeholder="Pesquisar produto..."
                class="w-full border-b-2 border-slate-200 py-3 outline-none focus:border-blue-500">

        </div>

        <!-- Botão Novo -->
        <button class="w-full mt-4 bg-blue-600 text-white py-3 rounded-full font-medium shadow">

            + Novo Produto

        </button>

        <!-- Lista -->
        <div id="listaProdutos" class="mt-6 space-y-4">

        </div>

    </main>
    <div
  id="carrinho"
  class="fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl shadow-2xl transition-all duration-300">

  <!-- Cabeçalho sempre visível -->
  <div
    id="toggleCarrinho"
    class="flex justify-between items-center p-4 cursor-pointer">

    <div class="flex items-center gap-2">

      <span id="resumoCarrinho">
        0 itens
      </span>

    </div>

    <div>

      <span id="totalMiniCarrinho">
        R$ 0,00
      </span>

      <span id="iconeCarrinho">
        ▲
      </span>

    </div>

  </div>

  <!-- Conteúdo -->
  <div
    id="conteudoCarrinho"
    class="hidden border-t p-4">

    <div id="listaCarrinho"></div>

    <div class="mt-4 border-t pt-4">

      <div class="flex justify-between font-bold">

        <span>Total</span>

        <span id="totalCarrinho">
          R$ 0,00
        </span>

      </div>

      <button
        class="w-full mt-4 bg-blue-600 text-white py-3 rounded-2xl">

        Finalizar Pedido

      </button>

    </div>

  </div>

</div>

    <script type="module" src="./js/pages/produtos.page.js"></script>

</body>

</html>
