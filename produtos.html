<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <title>Produtos</title>
</head>

<body class="bg-slate-50">

  <!-- Header -->
  <header class="relative h-40 overflow-hidden">

    <svg viewBox="0 0 500 200" preserveAspectRatio="none" class="absolute inset-0 w-full h-full">

      <path fill="#2563EB" d="M0,0 L500,0 L500,130 C350,220 150,40 0,130 Z"></path>

    </svg>

    <div class="relative z-10 px-6 pt-6 flex gap-4 items-center">
      <span id="btnMenu" class="material-symbols-outlined text-3xl text-white ">menu </span>

      <h1 class="text-3xl font-semibold text-white">Produtos</h1>
      <div id="indResp" class="w-[15px] h-[15px] bg-blue-300 rounded-full ml-auto"></div>
    </div>

  </header>

  <main class="px-5 -mt-4">
    <!-- Busca -->
    <span id="bemvindo" class="m-2"></span>
    <div class="bg-white rounded-2xl shadow p-4">

      <input id="pesquisa" type="text" placeholder="Pesquisar produto..."
        class="w-full border-b-2 border-slate-200 py-3 outline-none focus:border-blue-500">

    </div>

    <!-- Botão Novo -->
    <!-- <button class="w-full mt-4 bg-blue-600 text-white py-3 rounded-full font-medium shadow">

      + Novo Produto

    </button> -->

    <!-- Lista -->
    <div id="listaProdutos" class="mt-6 mb-20 pb-20 space-y-4"></div>

  </main>

  <div id="carrinho"
    class="fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.15)]
border-t border-gray-200 transition-all duration-300">

    <!-- Cabeçalho sempre visível -->
    <div id="toggleCarrinho" class="flex justify-between items-center p-4 cursor-pointer">

      <div class="flex items-center gap-2">

        <span id="resumoCarrinho">
          0 itens
        </span>

      </div>

      <div class="flex gap-4">

        <span id="totalMiniCarrinho">
          R$ 0,00
        </span>

        <span id="iconeCarrinho">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transition-transform duration-300" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </span>

      </div>

    </div>

    <!-- Conteúdo -->
    <div id="conteudoCarrinho"
      class="flex flex-col border-t overflow-hidden max-h-0 opacity-0 transition-all duration-300 p-0">

      <div id="listaCarrinho" class="flex-1 overflow-y-auto pr-2"></div>

      <div class=" mt-4 border-t pt-4 sticky bottom-0 bg-white ">

        <div class="flex justify-between font-bold">

          <span>Total</span>

          <span id="totalCarrinho">R$ 0,00</span>

        </div>

        <button id="finalizarPedido" class=" w-full mt-4 bg-blue-600 text-white py-3 rounded-2xl">Finalizar
          Pedido</button>

      </div>

    </div>

  </div>

  <div id="menuOverlay"></div>

  <div id="menuLateral" class="flex justify-between">
    <div class="flex flex-col h-[100%]">
      <div class="flex justify-between items-center">
        <span class="ml-5 text-2xl font-semibold">
          Menu de Gestão
        </span>
        <span id="fechar" class="w-10 m-5 flex justify-center items-center font-bold material-symbols-outlined"> close </span>
      </div>

      <hr>
  
      <div class="mt-5">
        <div id="pageProdutos" data-page="produtos" class="p-5 flex items-center">
          <span class="material-symbols-outlined text-blue-500">inventory_2</span>
          <span class="ml-2 text-2xl ">Produtos</span>
        </div>

        <div id="pageVenda" data-page="vendas" class="p-5 flex items-center">
          <span class="material-symbols-outlined text-purple-500">point_of_sale</span>
          <span class="ml-2 text-2xl ">Minhas vendas</span>
        </div>

        <div id="pageRelatorios" data-page="analiseVendas" class="p-5 flex items-center">
          <span class="material-symbols-outlined text-green-500">description</span>
          <span class="ml-2 text-2xl ">Análise de Vendas</span>
        </div>
        
        <div id="pagePendentes" data-page="pendentes" class="p-5 flex items-center">
          <span class="material-symbols-outlined text-red-500">credit_card_clock</span>
          <span class="ml-2 text-2xl ">Pendentes</span>
        </div>

        <div id="pageConfig" data-page="configuracoes" class="p-5 flex items-center">
          <span class="material-symbols-outlined text-orange-500">settings</span>
          <span class="ml-2 text-2xl ">Configurações</span>
        </div>
      
      </div>

      <div id="back" class="p-5 flex items-center mt-[auto]">
          <span class="material-symbols-outlined text-gray-500">exit_to_app</span>
          <span class="ml-2 text-2xl  ">Sair</span>
      </div>
    </div>
   
    <div class="p-5 flex justify-center items-center text-sm">
      Desenvolvido com <span class="material-symbols-outlined ml-2 mr-2 text-orange-900">coffee</span> por <strong class="ml-2">Tiago Pereira</strong>
    </div>
  </div>

<!-- MODAL OBSERVAÇÃO -->
  <div id="modalObs" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-5">
  
    <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-[0_20px_60px_rgba(0,0,0,0.30)]">
  
      <div class="text-center">
  
        <h2 class=" text-2xl font-bold">
          Adicionar ao pedido
        </h2>
   
      </div>
  
      <textarea id="obsProduto" placeholder="Observação (opcional)" class="mt-6 w-full border rounded-2xl p-4 min-h-[60px] outline-none focus:ring-2 focus:ring-blue-500"></textarea>
  
      <div class=" flex justify-end gap-3 mt-6">

        <button id="cancelarObs" class=" px-5 py-3 rounded-xl bg-gray-500 text-white">
  
          cancelar
  
        </button>
        <button id="confirmarObs" class=" px-5 py-3 rounded-xl bg-blue-500 text-white">
  
          Avançar
  
        </button>
  
      </div>
  
    </div>
  
  </div>

  <script type="module" src="./js/pages/produtos.page.js"></script>
 
</body>

</html>
